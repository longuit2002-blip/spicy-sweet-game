services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sweet_spicy
    ports:
      # Use 5433 on the host so a local Postgres install on 5432 does not shadow this container.
      - "5433:5432"
    volumes:
      - sweet_spicy_pg:/var/lib/postgresql/data

volumes:
  sweet_spicy_pg:
