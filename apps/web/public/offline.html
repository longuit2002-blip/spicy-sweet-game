<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline — Sweet &amp; Spicy</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
      text-align: center;
    }

    .container {
      max-width: 28rem;
    }

    .emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f8fafc;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    .retry-btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #2563eb;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      transition: background 0.15s ease;
    }

    .retry-btn:hover,
    .retry-btn:focus-visible {
      background: #1d4ed8;
    }

    .retry-btn:focus-visible {
      outline: 2px solid #60a5fa;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji" aria-hidden="true">🌶️</div>
    <h1>You're offline</h1>
    <p>
      Sweet &amp; Spicy needs an internet connection to play.
      Check your Wi-Fi or mobile data and try again.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      Try again
    </button>
  </div>
</body>
</html>
