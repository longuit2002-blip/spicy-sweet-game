# Full vhost for ONE domain: replace file on the server at:
#   /etc/nginx/sites-available/sweetspicy
# Then:
#   sudo ln -sf /etc/nginx/sites-available/sweetspicy /etc/nginx/sites-enabled/sweetspicy
#   sudo rm -f /etc/nginx/sites-enabled/sweet-spicy
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace every sweetspicy.qzz.io with your real domain if different.
# Cert paths must match: ls /etc/letsencrypt/live/

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS (keep .well-known for Certbot renewal)
server {
    listen 80;
    listen [::]:80;
    server_name sweetspicy.qzz.io;

    client_max_body_size 10m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sweetspicy.qzz.io;

    ssl_certificate /etc/letsencrypt/live/sweetspicy.qzz.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sweetspicy.qzz.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Uncomment if these files exist (common after `certbot --nginx` on Ubuntu):
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    # Order matters: more specific paths before /
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
