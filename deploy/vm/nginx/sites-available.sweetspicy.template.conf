# Templated by scripts/deploy/sync-nginx-sweetspicy.sh — __DEPLOY_DOMAIN__ is replaced with the
# hostname parsed from NEXT_PUBLIC_SOCKET_URL (scheme/port stripped).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DEPLOY_DOMAIN__ www.__DEPLOY_DOMAIN__;

    client_max_body_size 10m;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# No http2 on 443: browsers may negotiate HTTP/2 for this socket; Engine.IO WebSocket
# upgrade is most reliable over HTTP/1.1 from client to nginx (see deploy/vm/nginx/default.conf).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name __DEPLOY_DOMAIN__ www.__DEPLOY_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__DEPLOY_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DEPLOY_DOMAIN__/privkey.pem;
    # Match Certbot’s nginx TLS snippet (Ubuntu package certbot installs these files):
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
