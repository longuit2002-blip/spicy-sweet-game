# Install on the EC2 host as /etc/nginx/sites-available/sweet-spicy (or include from nginx.conf).
# Upstream apps listen on localhost only (Docker publish 127.0.0.1:3000 / 127.0.0.1:8000).
#
# HTTPS / WSS: If Certbot added a separate `server { listen 443 ssl; ... }`, that block MUST repeat
# the same `location /api/`, `location /socket.io`, and `location /` as below. Symptom: HTTP
# `curl http://127.0.0.1/socket.io/...` works but browser `wss://your.domain/socket.io` fails —
# the TLS server block is sending `/socket.io` to Next (:3000) instead of API (:8000).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 10m;

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST: strip /api prefix — Nest serves /auth/..., not /api/auth/...
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO (websocket upgrade; match /socket.io and /socket.io/...)
    location /socket.io {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

# Browsers use https:// and wss:// → requests hit port 443. You MUST serve the same proxy rules on TLS.
# 1) Set server_name and ssl_certificate paths (run certbot if needed: certbot certonly --nginx -d YOUR_DOMAIN).
# 2) If another file already has `listen 443` for this host, either remove it or merge these locations there
#    (only one active server block should own 443 for a given server_name — check sites-enabled/).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sweetspicy.qzz.io;

    ssl_certificate /etc/letsencrypt/live/sweetspicy.qzz.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sweetspicy.qzz.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
